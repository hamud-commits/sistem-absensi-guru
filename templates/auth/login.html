<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Sistem Informasi Absensi Guru</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="login-page">
  <div class="login-bg"></div>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-7 col-xl-6">
        <div class="card shadow-lg border-0 login-card">
          <div class="card-body p-4 p-md-5">
            {% include 'partials/flash.html' %}

            <div class="text-center mb-4">
              <div class="d-flex justify-content-center gap-3 align-items-center mb-3">
                <img src="{{ url_for('static', filename=profil_madrasah.logo_kemenag) if profil_madrasah and profil_madrasah.logo_kemenag else url_for('static', filename='logo/logo_kemenag.png') }}" class="login-logo" alt="Logo Kemenag">
                <img src="{{ url_for('static', filename=profil_madrasah.logo_madrasah) if profil_madrasah and profil_madrasah.logo_madrasah else url_for('static', filename='logo/logo_madrasah.png') }}" class="login-logo" alt="Logo Madrasah">
              </div>
              <h1 class="h4 mb-1 fw-bold">Sistem Informasi Absensi Guru</h1>
              <div class="text-muted">{{ profil_madrasah.nama_madrasah if profil_madrasah else 'MI AL-KHAIRIYAH BADAMUSALAM' }}</div>
            </div>

            <form method="post" class="vstack gap-3">
              <div>
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Masukkan username" required>
              </div>
              <div>
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Masukkan password" required>
              </div>
              <button type="submit" class="btn btn-success btn-lg w-100">Masuk</button>
              <div class="small text-muted text-center">
                Default admin: <span class="text-dark">admin</span> / <span class="text-dark">admin123</span>
              </div>
            </form>
          </div>
          <div class="card-footer text-center small text-muted bg-white border-0 pb-4">
            {{ profil_madrasah.nama_madrasah if profil_madrasah else 'MI AL-KHAIRIYAH BADAMUSALAM' }} © 2026
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
