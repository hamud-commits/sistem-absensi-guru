{% extends 'partials/base.html' %}
{% set title = 'Profil Saya' %}

{% block content %}
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <h2 class="h5 mb-0">Profil Saya</h2>
      <div class="text-muted small">Ubah foto, password, nomor HP, dan email</div>
    </div>
  </div>

  <form method="post" enctype="multipart/form-data">
    <div class="row g-3">
      <div class="col-md-4">
        <div class="card">
          <div class="card-body text-center">
            <img src="{{ url_for('static', filename=row.foto) if row.foto else url_for('static', filename='images/user.svg') }}" class="rounded-circle mb-3" style="width:140px;height:140px;object-fit:cover;" alt="Foto">
            <div class="fw-semibold">{{ row.nama }}</div>
            <div class="text-muted small">{{ row.nip }}</div>
            <div class="mt-3">
              <label class="form-label">Ubah Foto</label>
              <input type="file" class="form-control" name="foto" accept="image/*">
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nomor HP</label>
                <input class="form-control" name="no_hp" value="{{ row.no_hp or '' }}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" value="{{ row.email or '' }}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Password Baru (opsional)</label>
                <input type="password" class="form-control" name="password" placeholder="Kosongkan bila tidak diubah">
              </div>
            </div>
          </div>
          <div class="card-footer bg-white d-flex justify-content-end">
            <button class="btn btn-success" type="submit">Simpan</button>
          </div>
        </div>
      </div>
    </div>
  </form>
{% endblock %}
